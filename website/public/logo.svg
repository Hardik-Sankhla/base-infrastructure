<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Outer hexagon -->
  <polygon points="100,15 175,57.5 175,142.5 100,185 25,142.5 25,57.5"
    fill="url(#grad)" />
  <!-- Inner icon: stacked layers suggesting infrastructure -->
  <rect x="60" y="85" width="80" height="12" rx="4" fill="white" opacity="0.95"/>
  <rect x="65" y="102" width="70" height="10" rx="4" fill="white" opacity="0.80"/>
  <rect x="70" y="117" width="60" height="9" rx="4" fill="white" opacity="0.60"/>
  <!-- Top node dot -->
  <circle cx="100" cy="68" r="10" fill="white" opacity="0.95"/>
  <!-- Connecting lines -->
  <line x1="100" y1="78" x2="100" y2="85" stroke="white" stroke-width="2" opacity="0.8"/>
</svg>
