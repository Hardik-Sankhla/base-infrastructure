name: CI

on:
  push:
    branches: [ "main", "fix/*", "feature/*", "chore/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Download Modules
      run: go mod download

    - name: Install Tools
      run: |
        go install mvdan.cc/gofumpt@latest
        curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.56.2

    - name: Verify Formatting (gofmt)
      run: |
        gofmt -s -w .
        if [ -n "$(git diff --name-only)" ]; then
          echo "The following files are not formatted with gofmt -s:"
          git diff --name-only
          echo ""
          echo "Diff:"
          git diff
          echo ""
          echo "Fix: run 'gofmt -s -w .' locally and commit."
          exit 1
        fi

    - name: Verify Formatting (gofumpt)
      run: |
        gofumpt -extra -w .
        if [ -n "$(git diff --name-only)" ]; then
          echo "The following files are not formatted with gofumpt -extra:"
          git diff --name-only
          echo ""
          echo "Diff:"
          git diff
          echo ""
          echo "Fix: run 'gofumpt -extra -w .' locally and commit."
          exit 1
        fi

    - name: Build (Pre-cache for linter)
      run: go build -v ./...

    - name: Run Linters
      run: golangci-lint run ./...

    - name: Run Tests (Race Detector)
      run: go test -v -race ./...

    - name: Run Tests (Coverage)
      run: go test -v -coverprofile=coverage.out ./...

    - name: Cross-Platform Build (Linux)
      run: GOOS=linux GOARCH=amd64 go build -v -o bin/platform-linux-amd64 ./cmd/platform/main.go

    - name: Runtime Verification (Linux)
      run: |
        chmod +x bin/platform-linux-amd64
        echo "=== Summary Output ==="
        ./bin/platform-linux-amd64 discover --summary
        echo "=== JSON Output ==="
        ./bin/platform-linux-amd64 discover --json | jq .
        echo "=== YAML Output ==="
        ./bin/platform-linux-amd64 discover --yaml
        echo "=== Hardware Filter Output ==="
        ./bin/platform-linux-amd64 discover --hardware --json | jq .
        echo "=== Output to File ==="
        ./bin/platform-linux-amd64 discover --output ci-report.json
        cat ci-report.json

    - name: Cross-Platform Build (Windows)
      run: GOOS=windows GOARCH=amd64 go build -v -o bin/platform-windows-amd64.exe ./cmd/platform/main.go

    - name: Cross-Platform Build (macOS)
      run: GOOS=darwin GOARCH=arm64 go build -v -o bin/platform-darwin-arm64 ./cmd/platform/main.go
